<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Doubt Saathi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper: #FAF6EC;
    --paper-line: #C9D6EE;
    --margin-red: #B23A2E;
    --ink: #1C2440;
    --ink-soft: #4A5170;
    --rule-blue: #35509A;
    --tick-green: #2E7D5B;
    --highlight: #F4C84C;
    --card: #FFFFFF;
    --shadow: rgba(28,36,64,0.10);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    min-height:100vh;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 37px,
      var(--paper-line) 37px,
      var(--paper-line) 38px
    );
    opacity:0.55;
  }

  .margin-line{
    position:fixed;
    top:0; bottom:0;
    left:56px;
    width:2px;
    background: var(--margin-red);
    opacity:0.35;
    z-index:0;
  }
  @media (max-width: 640px){ .margin-line{ left:28px; } }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding: 28px 32px;
    position:relative; z-index:2;
    max-width: 980px; margin:0 auto;
  }
  @media (max-width: 640px){ header{ padding: 22px 20px 22px 44px; } }

  .logo{
    font-family:'Kalam', cursive;
    font-weight:700;
    font-size: 1.5rem;
    color: var(--ink);
    text-decoration:none;
    display:flex; align-items:baseline; gap:6px;
  }
  .logo span{ color:var(--margin-red); }

  .back-link{
    font-size:0.9rem; color:var(--ink-soft); text-decoration:none; font-weight:500;
  }
  .back-link:hover{ color:var(--rule-blue); }

  main{
    position:relative; z-index:1;
    max-width: 460px;
    margin: 0 auto;
    padding: 20px 32px 60px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  @media (max-width: 640px){ main{ padding: 20px 20px 60px 44px; } }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:0.8rem;
    letter-spacing:0.08em;
    color: var(--tick-green);
    display:inline-flex; align-items:center; gap:8px;
    background: rgba(46,125,91,0.08);
    padding: 6px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .eyebrow::before{ content:"🔐"; }

  h1{
    font-family:'Kalam', cursive;
    font-weight:700;
    font-size: clamp(1.8rem, 5vw, 2.4rem);
    line-height:1.2;
    margin: 0 0 10px;
    text-align:center;
  }
  h1 .underline{
    position:relative;
    white-space:nowrap;
  }
  h1 .underline::after{
    content:"";
    position:absolute;
    left:-2px; right:-2px; bottom:2px;
    height: 9px;
    background: var(--highlight);
    z-index:-1;
    opacity:0.65;
    transform: skewX(-4deg);
  }

  .lede{
    font-size: 1rem;
    color: var(--ink-soft);
    text-align:center;
    max-width: 34ch;
    line-height:1.6;
    margin-bottom: 32px;
  }

  .login-card{
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 10px 30px var(--shadow);
    padding: 30px 26px;
    width: 100%;
    border: 1px solid rgba(28,36,64,0.06);
    position:relative;
    transform: rotate(-0.6deg);
  }
  .login-card::before{
    content:"Class 9–12 · Verified Students";
    position:absolute;
    top:-13px; left:22px;
    background: var(--margin-red);
    color:white;
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    padding: 4px 10px;
    border-radius: 6px;
    white-space:nowrap;
  }

  label{
    display:block;
    font-size:0.85rem;
    font-weight:600;
    color: var(--ink);
    margin-bottom:8px;
  }

  input{
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid var(--paper-line);
    border-radius: 10px;
    font-size: 15px;
    font-family:'Work Sans', sans-serif;
    margin-bottom: 18px;
    background: var(--paper);
    color: var(--ink);
  }
  input:focus{
    outline:none;
    border-color: var(--rule-blue);
    background: white;
  }
  input::placeholder{ color: #9aa3bd; }

  .btn{
    width: 100%;
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    font-size:1rem;
    padding: 14px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    text-decoration:none;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary{
    background: var(--rule-blue);
    color: white;
    box-shadow: 0 4px 0 #253d78;
  }
  .btn-primary:hover:not(:disabled){ transform: translateY(-2px); }
  .btn-primary:active:not(:disabled){ transform: translateY(2px); box-shadow: 0 2px 0 #253d78; }
  .btn-primary:disabled{
    background: #9aa8cf;
    box-shadow: 0 4px 0 #7d89b3;
    cursor:not-allowed;
  }

  #msg{
    margin-top: 16px;
    font-size: 0.88rem;
    text-align: center;
    line-height:1.5;
    min-height: 20px;
  }
  .success{ color: var(--tick-green); font-weight:600; }
  .error{ color: var(--margin-red); font-weight:600; }

  .divider{
    display:flex; align-items:center; gap:10px;
    margin: 24px 0 18px;
    color:#b8bfd6;
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
  }
  .divider::before, .divider::after{
    content:""; flex:1; height:1px; background: var(--paper-line);
  }

  .info-row{
    display:flex; gap:10px; align-items:flex-start;
    font-size:0.82rem; color: var(--ink-soft); line-height:1.5;
  }
  .info-row .tick{ color: var(--tick-green); font-family:'JetBrains Mono', monospace; font-weight:700; flex-shrink:0; }

  .fade-in{
    opacity:0;
    transform: translateY(14px);
    animation: fadeUp 0.6s ease forwards;
  }
  @keyframes fadeUp{ to{ opacity:1; transform:translateY(0); } }
  .d1{ animation-delay: 0.05s; }
  .d2{ animation-delay: 0.15s; }
  .d3{ animation-delay: 0.25s; }

  @media (prefers-reduced-motion: reduce){
    .fade-in{ animation:none; opacity:1; transform:none; }
  }

  a:focus-visible, button:focus-visible, input:focus-visible{
    outline: 3px solid var(--rule-blue);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<div class="margin-line"></div>

<header>
  <a href="index.html" class="logo">Doubt<span>Saathi</span></a>
  <a href="index.html" class="back-link">← Home</a>
</header>

<main>
  <div class="eyebrow fade-in d1">Magic link · No password</div>
  <h1 class="fade-in d1">Welcome back, <span class="underline">saathi</span></h1>
  <p class="lede fade-in d2">Enter your email and we'll send a one-tap sign-in link. No password to remember, no forms to fill.</p>

  <div class="login-card fade-in d3">
    <form id="loginForm">
      <label for="email">Your email</label>
      <input type="email" id="email" placeholder="you@email.com" required>
      <button type="submit" class="btn btn-primary" id="submitBtn">Send Magic Link</button>
    </form>

    <div id="msg"></div>

    <div class="divider">HOW IT WORKS</div>
    <div class="info-row">
      <span class="tick">✓</span>
      <span>We email you a secure link — click it and you're straight into your feed. Nothing to type, nothing to forget.</span>
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = "https://kqpftmmrelcrdpofrwal.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_glv8p0542LAoIriNqCrPDQ_mRSQnsO7";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById("loginForm");
  const msg = document.getElementById("msg");
  const btn = document.getElementById("submitBtn");

  // If already logged in, go straight to feed
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = "feed.html";
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    btn.disabled = true;
    btn.textContent = "Sending...";
    msg.textContent = "";
    msg.className = "";

    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: window.location.origin + "/feed.html"
      }
    });

    btn.disabled = false;
    btn.textContent = "Send Magic Link";

    if (error) {
      msg.textContent = "Something went wrong: " + error.message;
      msg.className = "error";
    } else {
      msg.textContent = "✅ Link sent! Check your email (and spam folder too).";
      msg.className = "success";
    }
  });
</script>

</body>
</html>
