<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doubt Saathi — Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #FAF6EC;
    --paper-line: #C9D6EE;
    --margin-red: #B23A2E;
    --ink: #1C2440;
    --ink-soft: #4A5170;
    --rule-blue: #35509A;
    --tick-green: #2E7D5B;
    --highlight: #F4C84C;
    --card: #FFFFFF;
    --shadow: rgba(28,36,64,0.10);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh;
    background:var(--paper);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: repeating-linear-gradient(to bottom, transparent, transparent 37px, var(--paper-line) 37px, var(--paper-line) 38px);
    opacity:0.4;
  }
  .margin-line{ position:fixed; top:0; bottom:0; left:56px; width:2px; background:var(--margin-red); opacity:0.3; z-index:0; }
  @media (max-width: 640px){ .margin-line{ left:20px; } }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding: 20px 32px; position:relative; z-index:2;
    background: var(--card); border-bottom: 1px solid rgba(28,36,64,0.08);
  }
  .logo{ font-family:'Kalam', cursive; font-weight:700; font-size:1.3rem; }
  .logo span{ color:var(--margin-red); }
  .who{ font-size:0.85rem; color:var(--ink-soft); display:flex; align-items:center; gap:10px; }
  .who .avatar{
    width:30px; height:30px; border-radius:50%; background:var(--rule-blue); color:white;
    display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace;
    font-size:0.75rem; font-weight:700;
  }

  .wrap{ position:relative; z-index:1; max-width: 720px; margin:0 auto; padding: 28px 24px 80px; }
  @media (max-width: 640px){ .wrap{ padding: 20px 16px 80px 36px; } }

  /* Post box */
  .post-box{
    background: var(--card); border-radius: 16px; padding: 20px;
    box-shadow: 0 6px 20px var(--shadow); border: 1px solid rgba(28,36,64,0.06);
    margin-bottom: 28px;
  }
  .post-box textarea{
    width:100%; border:none; resize:none; font-family:'Work Sans',sans-serif;
    font-size:1rem; color:var(--ink); min-height:70px; outline:none; background:transparent;
  }
  .post-row{ display:flex; gap:10px; align-items:center; margin-top:12px; flex-wrap:wrap; }
  select{
    font-family:'JetBrains Mono', monospace; font-size:0.8rem; font-weight:600;
    border: 1.5px solid var(--paper-line); border-radius:8px; padding:8px 10px;
    background:#FDFCFA; color:var(--ink); flex-shrink:0;
  }
  .post-btn{
    margin-left:auto; background:var(--rule-blue); color:white; border:none; border-radius:8px;
    padding:10px 20px; font-weight:600; font-size:0.9rem; cursor:pointer;
    box-shadow: 0 3px 0 #253d78;
  }
  .post-btn:hover{ transform:translateY(-1px); }
  .post-btn:disabled{ opacity:0.5; cursor:not-allowed; }

  /* Filter tabs */
  .filters{ display:flex; gap:8px; overflow-x:auto; margin-bottom:20px; padding-bottom:4px; }
  .filter-tab{
    font-family:'JetBrains Mono', monospace; font-size:0.78rem; font-weight:600;
    padding:7px 14px; border-radius:20px; border:1.5px solid var(--paper-line);
    background:var(--card); color:var(--ink-soft); white-space:nowrap; cursor:pointer;
  }
  .filter-tab.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }

  /* Doubt card */
  .doubt-card{
    background: var(--card); border-radius: 14px; padding: 18px 20px;
    box-shadow: 0 4px 14px var(--shadow); border: 1px solid rgba(28,36,64,0.06);
    margin-bottom: 18px;
  }
  .doubt-meta{ display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .subject-pill{
    font-family:'JetBrains Mono', monospace; font-size:0.7rem; font-weight:700;
    background: var(--margin-red); color:white; padding:3px 10px; border-radius:6px;
  }
  .doubt-name{ font-size:0.8rem; color:var(--ink-soft); font-weight:600; }
  .doubt-time{ font-size:0.75rem; color:var(--ink-soft); margin-left:auto; }
  .doubt-q{ font-weight:600; line-height:1.55; margin-bottom:14px; }

  .replies{ border-top: 1px dashed var(--paper-line); padding-top:12px; }
  .reply{ display:flex; gap:10px; margin-bottom:10px; }
  .reply .avatar{
    width:24px; height:24px; border-radius:50%; background:var(--tick-green); color:white;
    display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:700;
    font-family:'JetBrains Mono',monospace; flex-shrink:0;
  }
  .reply-body{ background:#F1F5FC; border-radius:10px; padding:9px 12px; font-size:0.9rem; color:var(--ink-soft); flex:1; }
  .reply-body b{ color:var(--ink); }

  .reply-input-row{ display:flex; gap:8px; margin-top:10px; }
  .reply-input-row input{
    flex:1; border:1.5px solid var(--paper-line); border-radius:8px; padding:9px 12px;
    font-family:'Work Sans',sans-serif; font-size:0.88rem; outline:none;
  }
  .reply-input-row input:focus{ border-color:var(--rule-blue); }
  .reply-send{
    background:var(--tick-green); color:white; border:none; border-radius:8px;
    padding:0 16px; font-weight:600; font-size:0.85rem; cursor:pointer;
  }

  .empty{ text-align:center; color:var(--ink-soft); padding:40px 20px; font-size:0.9rem; }
  .loading{ text-align:center; color:var(--ink-soft); padding:20px; font-family:'JetBrains Mono',monospace; font-size:0.85rem; }
</style>
</head>
<body>

<div class="margin-line"></div>

<header>
  <div class="logo">Doubt<span>Saathi</span></div>
  <div class="who">
    <div class="avatar" id="my-avatar">?</div>
    <span id="my-name">Loading…</span>
  </div>
</header>

<div class="wrap">

  <div class="post-box">
    <textarea id="new-question" placeholder="Kya doubt hai? Yaha likho..."></textarea>
    <div class="post-row">
      <select id="new-subject">
        <option>Physics</option>
        <option>Chemistry</option>
        <option>Maths</option>
        <option>Biology</option>
        <option>English</option>
        <option>Computer Science</option>
        <option>Other</option>
      </select>
      <button class="post-btn" id="post-btn" onclick="postDoubt()">Post doubt</button>
    </div>
  </div>

  <div class="filters" id="filters">
    <div class="filter-tab active" data-subject="all">All</div>
    <div class="filter-tab" data-subject="Physics">Physics</div>
    <div class="filter-tab" data-subject="Chemistry">Chemistry</div>
    <div class="filter-tab" data-subject="Maths">Maths</div>
    <div class="filter-tab" data-subject="Biology">Biology</div>
    <div class="filter-tab" data-subject="English">English</div>
    <div class="filter-tab" data-subject="Computer Science">CS</div>
  </div>

  <div id="feed">
    <div class="loading">Loading doubts…</div>
  </div>

</div>

<div id="name-modal" style="display:none; position:fixed; inset:0; background:rgba(28,36,64,0.45); z-index:10; align-items:center; justify-content:center; padding:20px;">
  <div style="background:var(--card); border-radius:16px; padding:28px 24px; max-width:380px; width:100%;">
    <div class="logo" style="margin-bottom:4px;">Doubt<span>Saathi</span></div>
    <p style="color:var(--ink-soft); font-size:0.9rem; margin:6px 0 18px;">One last step — what should other students call you?</p>
    <input type="text" id="modal-name" placeholder="Your name" style="width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid var(--paper-line); font-family:'Work Sans',sans-serif; font-size:1rem; margin-bottom:14px; box-sizing:border-box;">
    <button class="post-btn" style="width:100%; margin-left:0;" onclick="saveModalName()">Join Doubt Saathi 🎉</button>
    <p style="font-size:0.78rem; color:var(--ink-soft); margin-top:14px; line-height:1.5;">🔒 Once set, your name is locked for 30 days.</p>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://kqpftmmrelcrdpofrwal.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_glv8p0542LAoIriNqCrPDQ_mRSQnsO7';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  let myUser = null;
  let myName = null;
  let activeFilter = 'all';

  async function init(){
    // Magic link se aaye ho to session set hone me thoda time lag sakta hai
    let { data: { user } } = await supabase.auth.getUser();

    if(!user){
      // ek baar retry karo (URL se session parse hone ka wait)
      await new Promise(r => setTimeout(r, 800));
      const retry = await supabase.auth.getUser();
      user = retry.data.user;
    }

    if(!user){
      document.getElementById('feed').innerHTML =
        '<div class="empty">Pehle login karo doubts dekhne ke liye. <a href="login.html">Login page pe jao →</a></div>';
      document.getElementById('my-name').textContent = 'Not logged in';
      return;
    }
    myUser = user;

    const { data: profile } = await supabase.from('profiles').select('name').eq('id', user.id).single();

    if(!profile || !profile.name){
      document.getElementById('name-modal').style.display = 'flex';
      document.getElementById('my-name').textContent = 'Setting up…';
      return;
    }

    myName = profile.name;
    document.getElementById('my-name').textContent = myName;
    document.getElementById('my-avatar').textContent = myName.slice(0,2).toUpperCase();

    loadFeed();
  }

  window.saveModalName = async function(){
    const name = document.getElementById('modal-name').value.trim();
    if(!name) return;

    const { error } = await supabase.from('profiles').upsert({
      id: myUser.id, email: myUser.email, name: name
    });

    if(error){ alert('Error: ' + error.message); return; }

    myName = name;
    document.getElementById('name-modal').style.display = 'none';
    document.getElementById('my-name').textContent = myName;
    document.getElementById('my-avatar').textContent = myName.slice(0,2).toUpperCase();
    loadFeed();
  };

  window.postDoubt = async function(){
    const question = document.getElementById('new-question').value.trim();
    const subject = document.getElementById('new-subject').value;
    if(!question){ return; }
    if(!myUser){ alert('Pehle login karo.'); return; }

    const btn = document.getElementById('post-btn');
    btn.disabled = true; btn.textContent = 'Posting…';

    const { error } = await supabase.from('doubts').insert({
      user_id: myUser.id, name: myName, subject, question
    });

    btn.disabled = false; btn.textContent = 'Post doubt';

    if(error){ alert('Error: ' + error.message); return; }

    document.getElementById('new-question').value = '';
    loadFeed();
  };

  window.postReply = async function(doubtId, inputEl){
    const answer = inputEl.value.trim();
    if(!answer || !myUser) return;

    const { error } = await supabase.from('replies').insert({
      doubt_id: doubtId, user_id: myUser.id, name: myName, answer
    });
    if(error){ alert('Error: ' + error.message); return; }
    inputEl.value = '';
    loadFeed();
  };

  async function loadFeed(){
    const feedEl = document.getElementById('feed');
    let query = supabase.from('doubts').select('*').order('created_at', { ascending: false });
    if(activeFilter !== 'all') query = query.eq('subject', activeFilter);

    const { data: doubts, error } = await query;
    if(error){ feedEl.innerHTML = '<div class="empty">Error loading feed.</div>'; return; }
    if(!doubts.length){ feedEl.innerHTML = '<div class="empty">Abhi koi doubt nahi hai — sabse pehle tum post karo! ✍️</div>'; return; }

    const { data: allReplies } = await supabase.from('replies').select('*').order('created_at', { ascending: true });

    feedEl.innerHTML = doubts.map(d => {
      const replies = (allReplies || []).filter(r => r.doubt_id === d.id);
      const repliesHtml = replies.map(r => `
        <div class="reply">
          <div class="avatar">${escapeHtml(r.name.slice(0,2).toUpperCase())}</div>
          <div class="reply-body"><b>${escapeHtml(r.name)}:</b> ${escapeHtml(r.answer)}</div>
        </div>
      `).join('');

      const timeAgo = formatTime(d.created_at);

      return `
        <div class="doubt-card">
          <div class="doubt-meta">
            <span class="subject-pill">${escapeHtml(d.subject)}</span>
            <span class="doubt-name">${escapeHtml(d.name)}</span>
            <span class="doubt-time">${timeAgo}</span>
          </div>
          <div class="doubt-q">${escapeHtml(d.question)}</div>
          <div class="replies">
            ${repliesHtml}
            <div class="reply-input-row">
              <input type="text" placeholder="Answer likho..." id="reply-${d.id}">
              <button class="reply-send" onclick="postReply('${d.id}', document.getElementById('reply-${d.id}'))">Send</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatTime(iso){
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if(diff < 60) return 'just now';
    if(diff < 3600) return Math.floor(diff/60) + 'm ago';
    if(diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  }

  document.getElementById('filters').addEventListener('click', (e) => {
    const tab = e.target.closest('.filter-tab');
    if(!tab) return;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeFilter = tab.dataset.subject;
    loadFeed();
  });

  init();
</script>

</body>
</html>
